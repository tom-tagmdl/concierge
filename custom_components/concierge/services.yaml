    profile_id:
      name: Profile ID
      required: true
      selector:
        text:
    name:
      name: Name
      required: true
      selector:
        text:
    persona:
      name: Persona
      required: false
      selector:
        text:
    tts_voice:
      name: TTS Voice
      required: false
      selector:
        text:
    verbosity:
      name: Verbosity
      required: false
      selector:
        text:
    allow_ai:
      name: Allow AI
      required: false
      selector:
        boolean:
    content_type:
      name: Content Type
      required: false
      selector:
        text:
    detail_level:
      name: Detail Level
      required: false
      selector:
        text:
    set_as_default:
      name: Set As Default
      required: false
      selector:
        boolean:

update_global_context:
  name: Update Global Context
  description: Update context usage preferences and optional summary payloads.
  fields:
    context_type:
      name: Context Type
      required: true
      selector:
        text:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:
    options:
      name: Options
      required: false
      selector:
        object:
    summary:
      name: Summary
      required: false
      selector:
        text:
    detail:
      name: Detail
      required: false
      selector:
        text:
    speakable:
      name: Speakable
      required: false
      selector:
        text:

update_execution_preferences:
  name: Update Execution Preferences
  description: Update execution preference configuration for a scope.
  fields:
    scope_id:
      name: Scope ID
      required: true
      selector:
        text:
    preferences:
      name: Preferences
      required: true
      selector:
        object:

get_context:
  name: Get Context
  description: Return one global context payload.
  fields:
    context_type:
      name: Context Type
      required: true
      selector:
        text:

get_summary:
  name: Get Summary
  description: Return a combined summary from available contexts and signals.
  fields:
    area_id:
      name: Area ID
      required: false
      selector:
        text:
    include_signals:
      name: Include Signals
      required: false
      selector:
        boolean:
    include_context:
      name: Include Context
      required: false
      selector:
        boolean:

preview_tts_voice:
  name: Preview TTS Voice
  description: Speak a sample Concierge greeting through a selected media player using the chosen TTS provider and voice.
  fields:
    provider:
      name: Provider
      required: true
      selector:
        text:
    media_player_entity_id:
      name: Media Player Entity IDs
      required: true
      selector:
        entity:
          filter:
            domain: media_player
          multiple: true
    voice:
      name: Voice
      required: false
      selector:
        text:
    message:
      name: Sample Message
      required: false
      selector:
        text:

sync_rooms:
  name: Sync Rooms
  description: Synchronize Concierge room configuration with current Home Assistant areas.
  fields:
    add_missing:
      name: Add Missing Rooms
      required: false
      selector:
        boolean:
    remove_missing:
      name: Remove Missing Rooms
      required: false
      selector:
        boolean:

refresh_entity_structure:
  name: Refresh Entity Structure
  description: Optionally sync rooms and reload Concierge to rebuild room entities.
  fields:
    sync_rooms:
      name: Sync Rooms First
      required: false
      selector:
        boolean:
    add_missing:
      name: Add Missing Rooms
      required: false
      selector:
        boolean:
    remove_missing:
      name: Remove Missing Rooms
      required: false
      selector:
        boolean:
