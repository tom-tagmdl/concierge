      required: false
      selector:
        entity:
          multiple: true
    light_entity_ids:
      name: Light and Lamp Entity IDs
      required: false
      selector:
        entity:
          domain: light
          multiple: true
    shade_entity_ids:
      name: Shade Entity IDs
      required: false
