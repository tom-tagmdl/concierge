execute:
  name: Execute
  description: Resolve and execute a configured target using Concierge orchestration rules.
  fields:
    target:
      name: Target
      required: true
      selector:
        text:
    area_id:
      name: Area ID
      required: false
      selector:
        text:
    composite_id:
      name: Composite ID
      required: false
      selector:
        text:
    context:
      name: Context
      required: false
      selector:
        object:

execute_direct:
  name: Execute Direct
  description: Execute a resolved direct target without orchestration.
  fields:
    entity_id:
      name: Entity ID
      required: true
      selector:
        text:
    service:
      name: Service
      required: true
      selector:
        text:
    data:
      name: Service Data
      required: false
      selector:
        object:

get_interactions:
  name: Get Interactions
  description: Return active interactions for a room or composite scope.
  fields:
    area_id:
      name: Area ID
      required: false
      selector:
        text:
    composite_id:
      name: Composite ID
      required: false
      selector:
        text:

update_interaction:
  name: Update Interaction
  description: Upsert runtime interaction state.
  fields:
    interaction_id:
      name: Interaction ID
      required: true
      selector:
        text:
    area_id:
      name: Area ID
      required: false
      selector:
        text:
    message:
      name: Message
      required: true
      selector:
        text:
    level:
      name: Level
      required: false
      selector:
        text:
    state:
      name: State
      required: false
      selector:
        text:
    priority:
      name: Priority
      required: false
      selector:
        number:
          min: 0
          max: 100

clear_interaction:
  name: Clear Interaction
  description: Remove a runtime interaction by ID.
  fields:
    interaction_id:
      name: Interaction ID
      required: true
      selector:
        text:

get_signal:
  name: Get Signal
  description: Return one signal snapshot.
  fields:
    signal_type:
      name: Signal Type
      required: true
      selector:
        text:

get_signals:
  name: Get Signals
  description: Return all known signal snapshots.
  fields:
    area_id:
      name: Area ID
      required: false
      selector:
        text:
    composite_id:
      name: Composite ID
      required: false
      selector:
        text:

