name: HACS Validation

on:
  pull_request:
  push:
    branches: [main]

  workflow_dispatch:
jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
